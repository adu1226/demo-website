<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NMC Smart Complaint Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */
body{
background:url("https://smsl.co.in/wp-content/uploads/2024/03/nagpur-bhandewadi-1024x576.jpg") no-repeat center center fixed;
background-size:cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
position:relative;
}

/* GLASS CONTAINER WITHOUT BLUR */
.container{
width:520px;
background:rgba(255,255,255,0.15); /* Slight transparency */
border-radius:20px;
padding:35px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
color:white;
animation:fadeIn 1s ease;
border:1px solid rgba(255,255,255,0.2);
}

/* FADE IN ANIMATION */
@keyframes fadeIn{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* LOGO */
.logo{
text-align:center;
margin-bottom:10px;
}
.logo img{
width:80px;
border-radius:10px;
}

/* TITLE */
h1{
text-align:center;
margin-bottom:20px;
font-weight:600;
letter-spacing:1px;
}

/* FORM LABEL */
label{
margin-top:12px;
display:block;
font-weight:500;
font-size:14px;
}

/* INPUTS */
input,select,textarea{
width:100%;
padding:11px;
margin-top:6px;
border:none;
border-radius:8px;
outline:none;
font-size:14px;
background:rgba(255,255,255,0.9);
}

/* TEXTAREA */
textarea{
height:90px;
resize:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff6b00,#ff9d00);
transition:0.3s;
font-weight:600;
}
button:hover{
transform:scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* VOICE BUTTON */
.voice-btn{
background:linear-gradient(45deg,#0099ff,#00c6ff);
}

/* IMAGE PREVIEW */
.preview{
margin-top:10px;
}
.preview img{
width:100%;
border-radius:10px;
display:none;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* MAP */
.map{
height:200px;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

/* BACK BUTTON */
.back-btn{
display:block;
text-align:center;
margin-top:15px;
background:#222;
padding:10px;
border-radius:8px;
text-decoration:none;
color:white;
transition:0.3s;
}
.back-btn:hover{
background:#444;
}

/* LOADER */
.loader{
display:none;
text-align:center;
margin-top:10px;
font-weight:bold;
color:#ffd700;
}

/* MOBILE RESPONSIVE */
@media(max-width:600px){
.container{
width:100%;
padding:25px;
}
h1{
font-size:22px;
}
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<img src="https://thelivenagpur.com/wp-content/uploads/2019/01/nmc_logo-1170x780.jpg">
</div>

<h1>NMC Smart Complaint</h1>

<form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

<select name="area" required>
  <option value="">Select Ward</option>
  {% for i in range(1, 39) %}
    <option value="Ward {{ i }}">Ward {{ i }}</option>
  {% endfor %}
</select>

<label>Category</label>
<select name="category" required>
<option value="">Select Category</option>
<option>Garbage</option>
<option>Road / Potholes</option>
<option>Water Supply</option>
<option>Street Light</option>
<option>Traffic</option>
<option>Public Health</option>
</select>

<label>Issue Description</label>
<textarea name="issue" id="issue" placeholder="Describe issue..."></textarea>

<button type="button" class="voice-btn" onclick="startVoice()">🎤 Speak Issue</button>

<label>Location / Landmark</label>
<input type="text" name="location" required>

<label>Take Photo</label>
<input type="file" name="photo" accept="image/*" capture="environment" onchange="previewImage(event)">

<div class="preview">
<img id="photoPreview">
</div>

<input type="hidden" id="latitude" name="latitude">
<input type="hidden" id="longitude" name="longitude">

<div class="map">
<iframe id="map" width="100%" height="100%" style="border:0;"></iframe>
</div>

<button type="submit">Submit Complaint</button>

<div class="loader" id="loader">Submitting Complaint...</div>

</form>

<a href="/dashboard" class="back-btn">Back to Dashboard</a>

</div>

<script>
/* IMAGE PREVIEW */
function previewImage(event){
const reader=new FileReader();
reader.onload=function(){
const output=document.getElementById('photoPreview');
output.src=reader.result;
output.style.display="block";
}
reader.readAsDataURL(event.target.files[0]);
}

/* GEO LOCATION */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(function(position){
let lat=position.coords.latitude;
let lon=position.coords.longitude;
document.getElementById("latitude").value=lat;
document.getElementById("longitude").value=lon;
document.getElementById("map").src=
"https://maps.google.com/maps?q="+lat+","+lon+"&z=15&output=embed";
});
}

/* VOICE INPUT */
function startVoice(){
var recognition=new webkitSpeechRecognition();
recognition.lang="en-IN";
recognition.onresult=function(event){
document.getElementById("issue").value=event.results[0][0].transcript;
}
recognition.start();
}

/* LOADER */
function showLoader(){
document.getElementById("loader").style.display="block";
}
</script>

</body>
</html>
