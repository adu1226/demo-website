<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>NMC Smart Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* Animated Gradient Background */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(-45deg,#ff6b00,#ff9966,#007bff,#00c6ff);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Glass Card */

.login-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:40px;
width:360px;
border-radius:15px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(-40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Logo */

.logo{
width:90px;
margin-bottom:10px;
border-radius:10px;
}

/* Title */

h2{
color:white;
margin-bottom:25px;
letter-spacing:1px;
}

/* Inputs */

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
outline:none;
font-size:14px;
}

/* Button */

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
font-size:16px;
color:white;
cursor:pointer;
background:linear-gradient(45deg,#ff6b00,#ff9500);
transition:0.4s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* Back Link */

.back{
display:block;
margin-top:15px;
color:white;
text-decoration:none;
font-size:14px;
}

.back:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-box">

<img src="https://thelivenagpur.com/wp-content/uploads/2019/01/nmc_logo-1170x780.jpg" class="logo">

<h2>NMC Admin Login</h2>

<form method="POST" action="/admin" autocomplete="off">

<div class="input-box">
<input type="email" name="email" placeholder="Admin Email" autocomplete="off" required>
</div>

<div class="input-box">
<input type="password" name="password" placeholder="Password" autocomplete="new-password" required>
</div>

<button type="submit">Login</button>

</form>

<a class="back" href="/">← Back to Home</a>

</div>

</body>
</html>
